{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-200 p-8 mt-4">

  <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center text-2xl mb-4">🔑</div>
  <h2 class="text-2xl font-bold text-gray-800 mb-1">Forgot password?</h2>
  <p class="text-sm text-gray-500 mb-6">
    Enter your username and the email you registered with. We'll verify your identity and let you set a new password.
  </p>

  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
      <input name="username" type="text" required placeholder="Your username"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
      <input name="email" type="email" required placeholder="The email on your account"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition text-sm">
      Verify Identity
    </button>
  </form>

  <p class="text-center text-sm text-gray-500 mt-5">
    Remember your password?
    <a href="{{ url_for('login') }}" class="text-indigo-600 font-medium hover:underline">Back to login</a>
  </p>
</div>

{% endblock %}
