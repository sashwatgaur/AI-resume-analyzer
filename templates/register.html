{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-200 p-8 mt-8">
  <h2 class="text-2xl font-bold text-gray-800 mb-1">Create an account</h2>
  <p class="text-sm text-gray-500 mb-6">Start analyzing your resume with AI</p>

  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
      <input name="username" type="text" required placeholder="e.g. johndoe"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input name="email" type="email" required placeholder="you@example.com"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input name="password" type="password" required placeholder="••••••••"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition text-sm">
      Create Account
    </button>
  </form>

  <p class="text-center text-sm text-gray-500 mt-5">
    Already have an account?
    <a href="{{ url_for('login') }}" class="text-indigo-600 font-medium hover:underline">Log in</a>
  </p>
</div>

{% endblock %}
