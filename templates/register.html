{% extends 'base.html' %}

{% block content %}

<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow">

<h2 class="text-2xl font-bold mb-6">Register</h2>

<form method="POST">

<input
name="username"
placeholder="Username"
class="w-full border p-3 rounded mb-4">

<input
type="password"
name="password"
placeholder="Password"
class="w-full border p-3 rounded mb-4">

<button
class="w-full bg-indigo-600 text-white p-3 rounded">
Register
</button>

</form>

<p class="mt-4 text-center text-gray-600">
Already have an account? <a href="/login" class="text-indigo-600">Login</a>
</p>

</div>

{% endblock %}
