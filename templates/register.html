{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-200 p-8 mt-4">
  <h2 class="text-2xl font-bold text-gray-800 mb-1">Create an account</h2>
  <p class="text-sm text-gray-500 mb-6">Start analyzing your resume with AI</p>

  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Username <span class="text-red-500">*</span></label>
      <input name="username" type="text" required placeholder="e.g. johndoe"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
      <input name="email" type="email" required placeholder="you@example.com"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Phone Number
        <span class="text-gray-400 font-normal">(optional)</span>
      </label>
      <div class="flex">
        <span class="inline-flex items-center px-3 border border-r-0 border-gray-300 rounded-l-lg bg-gray-50 text-gray-500 text-sm">📞</span>
        <input name="phone" type="tel" placeholder="+1 555 000 0000"
               class="w-full border border-gray-300 rounded-r-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password <span class="text-red-500">*</span></label>
      <input name="password" type="password" required placeholder="Min. 6 characters"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition text-sm">
      Create Account
    </button>
  </form>

  <p class="text-center text-sm text-gray-500 mt-5">
    Already have an account?
    <a href="{{ url_for('login') }}" class="text-indigo-600 font-medium hover:underline">Log in</a>
  </p>
</div>

{% endblock %}
