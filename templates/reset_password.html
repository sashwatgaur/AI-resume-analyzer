{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-200 p-8 mt-4">

  <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-2xl mb-4">✅</div>
  <h2 class="text-2xl font-bold text-gray-800 mb-1">Set new password</h2>
  <p class="text-sm text-gray-500 mb-1">
    Identity verified for <span class="font-semibold text-gray-700">{{ username }}</span>.
  </p>
  <p class="text-xs text-amber-600 mb-6">This link expires in 15 minutes.</p>

  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">New password</label>
      <input name="password" type="password" required placeholder="Min. 6 characters"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Confirm new password</label>
      <input name="confirm_password" type="password" required placeholder="Repeat your password"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <button type="submit"
            class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg transition text-sm">
      Update Password
    </button>
  </form>
</div>

{% endblock %}
