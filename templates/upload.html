{% extends 'base.html' %}
{% block content %}

<div class="max-w-xl mx-auto">
  <div class="mb-6">
    <a href="{{ url_for('dashboard') }}" class="text-sm text-indigo-600 hover:underline">← Back to Dashboard</a>
  </div>

  <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
    <h2 class="text-2xl font-bold text-gray-800 mb-1">Upload Resume</h2>
    <p class="text-sm text-gray-500 mb-6">Upload a PDF and get an instant AI analysis</p>

    <form method="POST" enctype="multipart/form-data" id="uploadForm">
      <div id="dropzone"
           class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition mb-5">
        <div class="text-4xl mb-3">📄</div>
        <p class="text-gray-600 font-medium text-sm mb-1">Click to select or drag & drop</p>
        <p class="text-xs text-gray-400">PDF files only · Max 10 MB</p>
        <input type="file" name="resume" id="fileInput" accept=".pdf" required
               class="hidden">
        <p id="fileName" class="text-sm text-indigo-600 font-medium mt-3 hidden"></p>
      </div>

      <button type="submit" id="submitBtn"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition text-sm">
        Analyze Resume
      </button>
    </form>

    <div id="loadingMsg" class="hidden mt-4 text-center text-sm text-gray-500">
      ⏳ Analyzing your resume, please wait...
    </div>
  </div>
</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const form = document.getElementById('uploadForm');
  const submitBtn = document.getElementById('submitBtn');
  const loadingMsg = document.getElementById('loadingMsg');

  dropzone.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      fileName.textContent = '✅ ' + fileInput.files[0].name;
      fileName.classList.remove('hidden');
    }
  });

  dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('border-indigo-400', 'bg-indigo-50');
  });

  dropzone.addEventListener('dragleave', () => {
    dropzone.classList.remove('border-indigo-400', 'bg-indigo-50');
  });

  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      fileInput.files = files;
      fileName.textContent = '✅ ' + files[0].name;
      fileName.classList.remove('hidden');
    }
  });

  form.addEventListener('submit', () => {
    submitBtn.disabled = true;
    submitBtn.textContent = 'Analyzing...';
    loadingMsg.classList.remove('hidden');
  });
</script>

{% endblock %}
